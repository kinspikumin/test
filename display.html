<!DOCTYPE html>
<html>
<head>
  <title>Live Drawing Wall</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    .gallery { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .gallery img { width: 120px; height: 120px; object-fit: cover; border: 1px solid black; }
  </style>
</head>
<body>

<h2>Live Drawing Wall</h2>
<div class="gallery" id="gallery"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBUGz5l8cL0cJrSslQibdtmrsCgwbYPM0M",
    authDomain: "test-cd72b.firebaseapp.com",
    databaseURL: "https://test-cd72b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "test-cd72b",
    storageBucket: "test-cd72b.firebasestorage.app",
    messagingSenderId: "749803625813",
    appId: "1:749803625813:web:936d63e5c97f08f898a3dc",
    measurementId: "G-KP4VJP04KT"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const gallery = document.getElementById("gallery");

  db.collection("drawings").orderBy("createdAt").onSnapshot(snapshot => {
    gallery.innerHTML = ""; // clear gallery
    snapshot.forEach(doc => {
      const data = doc.data();
      const img = document.createElement("img");
      img.src = data.imageUrl;
      gallery.appendChild(img);
    });
  });
</script>

</body>
</html>
