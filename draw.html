<!DOCTYPE html>
<html>
<head>
  <title>Draw</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    canvas { border: 2px solid black; touch-action: none; }
    button { margin-top: 10px; padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>

<h2>Draw Your Passion!</h2>
<canvas id="canvas" width="400" height="400"></canvas>
<br>
<button onclick="submitDrawing()">Submit Drawing</button>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
  // 🔹 Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBUGz5l8cL0cJrSslQibdtmrsCgwbYPM0M",
    authDomain: "test-cd72b.firebaseapp.com",
    databaseURL: "https://test-cd72b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "test-cd72b",
    storageBucket: "test-cd72b.firebasestorage.app",
    messagingSenderId: "749803625813",
    appId: "1:749803625813:web:936d63e5c97f08f898a3dc",
    measurementId: "G-KP4VJP04KT"
  };

  // 🔹 Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const storage = firebase.storage();

  // 🎨 Drawing logic
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  let drawing = false;

  // Mouse & touch events
  canvas.onmousedown = () => drawing = true;
  canvas.onmouseup = () => drawing = false;
  canvas.onmousemove = (e) => {
    if (!drawing) return;
    ctx.fillRect(e.offsetX, e.offsetY, 4, 4);
  };

  canvas.addEventListener("touchstart", e => { drawing = true; });
  canvas.addEventListener("touchend", e => { drawing = false; });
  canvas.addEventListener("touchmove", e => {
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    ctx.fillRect(touch.clientX - rect.left, touch.clientY - rect.top, 4, 4);
    e.preventDefault();
  });

  // 🚀 Submit drawing
  async function submitDrawing() {
    const dataURL = canvas.toDataURL(); // convert canvas to image

    // Save image to Firebase Storage
    const ref = storage.ref("drawings/" + Date.now());
    await ref.putString(dataURL, "data_url");
    const url = await ref.getDownloadURL();

    // Save URL + timestamp to Firestore
    await db.collection("drawings").add({
      imageUrl: url,
      createdAt: Date.now()
    });

    // Clear canvas for next student
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    alert("Drawing submitted!");
  }
</script>

</body>
</html>
