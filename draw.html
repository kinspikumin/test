<!DOCTYPE html>
<html>
<head>
  <title>Draw Your Passion!</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    canvas { border: 2px solid black; touch-action: none; margin-top: 10px; }
    .tools { margin-bottom: 10px; }
    .tools label, .tools button { margin: 0 5px; }
    button { padding: 8px 16px; font-size: 14px; }
  </style>
</head>
<body>

<h2>Draw Your Passion!</h2>

<div class="tools">
  <label>Color: <input type="color" id="colorPicker" value="#000000"></label>
  <label>Size: <input type="range" id="sizePicker" min="1" max="20" value="4"></label>
  <button id="eraserBtn">Eraser Off</button>
  <button id="clearBtn">Clear Canvas</button>
</div>

<canvas id="canvas" width="800" height="800" style="width:400px; height:400px;"></canvas>
<br>
<button onclick="submitDrawing()">Submit Drawing</button>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
  // 🔹 Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBUGz5l8cL0cJrSslQibdtmrsCgwbYPM0M",
    authDomain: "test-cd72b.firebaseapp.com",
    databaseURL: "https://test-cd72b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "test-cd72b",
    storageBucket: "test-cd72b.firebasestorage.app",
    messagingSenderId: "749803625813",
    appId: "1:749803625813:web:936d63e5c97f08f898a3dc",
    measurementId: "G-KP4VJP04KT"
  };

  // 🔹 Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const storage = firebase.storage();

  // 🎨 Canvas setup
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  let drawing = false;
  let lastX = 0, lastY = 0;

  // Tools
  const colorPicker = document.getElementById("colorPicker");
  const sizePicker = document.getElementById("sizePicker");
  const eraserBtn = document.getElementById("eraserBtn");
  const clearBtn = document.getElementById("clearBtn");

  let brushColor = colorPicker.value;
  let brushSize = parseInt(sizePicker.value);
  let erasing = false;

  colorPicker.addEventListener("input", e => brushColor = e.target.value);
  sizePicker.addEventListener("input", e => brushSize = parseInt(e.target.value));

  eraserBtn.addEventListener("click", () => {
    erasing = !erasing;
    eraserBtn.textContent = erasing ? "Eraser On" : "Eraser Off";
  });

  clearBtn.addEventListener("click", () => ctx.clearRect(0, 0, canvas.width, canvas.height));

  // ✅ Helper: map touch/mouse coordinates to canvas pixels
  function getCanvasPos(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (canvas.width / rect.width),
      y: (clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  // Smooth drawing with mouse
  canvas.addEventListener("mousedown", e => {
    drawing = true;
    const pos = getCanvasPos(e.clientX, e.clientY);
    lastX = pos.x;
    lastY = pos.y;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
  });

  canvas.addEventListener("mousemove", e => {
    if (!drawing) return;
    const pos = getCanvasPos(e.clientX, e.clientY);
    ctx.lineWidth = brushSize;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = erasing ? "#FFFFFF" : brushColor;
    ctx.quadraticCurveTo(lastX, lastY, pos.x, pos.y);
    ctx.stroke();
    lastX = pos.x;
    lastY = pos.y;
  });

  canvas.addEventListener("mouseup", () => drawing = false);
  canvas.addEventListener("mouseleave", () => drawing = false);

  // Smooth drawing with touch (iPad)
  canvas.addEventListener("touchstart", e => {
    drawing = true;
    const pos = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
    lastX = pos.x;
    lastY = pos.y;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
  });

  canvas.addEventListener("touchmove", e => {
    if (!drawing) return;
    const pos = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
    ctx.lineWidth = brushSize;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = erasing ? "#FFFFFF" : brushColor;
    ctx.quadraticCurveTo(lastX, lastY, pos.x, pos.y);
    ctx.stroke();
    lastX = pos.x;
    lastY = pos.y;
    e.preventDefault();
  });

  canvas.addEventListener("touchend", () => drawing = false);
  canvas.addEventListener("touchcancel", () => drawing = false);

  // 🚀 Submit drawing
  async function submitDrawing() {
    const dataURL = canvas.toDataURL();
    const ref = storage.ref("drawings/" + Date.now());
    await ref.putString(dataURL, "data_url");
    const url = await ref.getDownloadURL();

    await db.collection("drawings").add({
      imageUrl: url,
      createdAt: Date.now()
    });

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    alert("Drawing submitted!");
  }
</script>

</body>
</html>
